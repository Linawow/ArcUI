name: Package and release

# Fires when a version tag (e.g. 3.7.2) is pushed. The BigWigs packager builds the
# addon per .pkgmeta, uploads it to CurseForge (project read from the .toc's
# X-Curse-Project-ID), and creates the matching GitHub release.
on:
  push:
    tags:
      - '**'

permissions:
  contents: write   # lets GITHUB_TOKEN create the GitHub release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags, needed for version/changelog detection

      - name: Package and release
        uses: BigWigsMods/packager@v2.5.1
        with:
          # Keep the default zip filename; set the CurseForge display label to
          # "ArcUI-<version>" (e.g. ArcUI-3.7.2).
          args: '-n ":{package-name}-{project-version}"'
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}        # CurseForge upload token (repo secret)
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }} # Wago upload (uses ## X-Wago-ID in the .toc)
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}     # auto-provided; for the GitHub release
